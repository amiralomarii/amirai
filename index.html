<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amir's AI Assistant</title>
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- KaTeX Styles & Scripts for Math Rendering -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <!-- Marked.js for Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <h1 class="chat-title">Amir's AI Assistant</h1>
        <div class="chat-status">
          <span class="status-dot"></span>
          <span class="status-text">AmirAI-2.0 • Online</span>
        </div>
      </div>
      <div id="chat-box" class="chat-box"></div>
      <div class="input-container">
        <textarea
          id="user-input"
          placeholder="Type your message..."
          rows="1"
        ></textarea>
        <button id="send-btn" aria-label="Send message">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.53 60.53 0 0 0 18.29-9.356.75.75 0 0 0 0-1.226 60.53 60.53 0 0 0-18.29-9.36Z" />
          </svg>
        </button>
      </div>
    </div>
    <script src="script.js"></script>
    <!-- Smart Auto-Scroll Observer -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const chatBox = document.getElementById("chat-box");
        if (chatBox) {
          const observer = new MutationObserver(() => {
            chatBox.scrollTo({
              top: chatBox.scrollHeight,
              behavior: 'smooth'
            });
          });
          observer.observe(chatBox, {
            childList: true,
            subtree: true,
            characterData: true
          });
        }
      });
    </script>
  </body>
</html>
